# IaaS Area
- name: ceph-provider
  description: Ceph provider implementation of the IronCore storage interface
  required_status_checks:
    github-actions:
      - integration-tests
      - lint
      - run
      - kustomize-validation
      - buildAndPush (ceph-bucket-provider, ceph-bucket-provider)
      - buildAndPush (ceph-volume-provider, ceph-volume-provider)
  collaborators:
    teams:
      - name: iaas-maintainers
        permission: push
      - name: iaas-contributors
        permission: triage

